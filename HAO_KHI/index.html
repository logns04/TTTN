<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Hào Khí Du Hiệp</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Header -->
    <header class="header sticky-top">
      <nav class="navbar navbar-expand-lg py-1">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="images/iconapp.png" class="logo img-fluid" alt="logo" />
          </a>
          <button
            class="navbar-toggler text-white border-0"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu"
          >
            <i class="bi bi-list fs-2 text-white"></i>
          </button>
          <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav align-items-lg-center ms-auto">
              <li class="nav-item">
                <a href="#" class="icon-btn">
                  <i class="fa-solid fa-house"></i>
                </a>
              </li>
              <li class="nav-item">
                <a href="#" class="icon-btn">
                  <i class="fa-brands fa-facebook-f"></i>
                </a>
              </li>
              <li class="nav-item">
                <a href="#" class="btn login-btn">
                  <img src="images/đn.png" alt="Đăng nhập" />
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <div class="hero-logo text-center">
      <img src="images/Logo-HaoKhiDuHiep.png" class="img-fluid" alt="Logo" />
    </div>
    <!-- Hero -->
    <section class="hero position-relative overflow-hidden">
      <div class="container-fluid p-0">
        <!-- <div class="hero-logo text-center">
            <img
                src="images/Logo-HaoKhiDuHiep.png"
                class="img-fluid"
                alt="Logo">
        </div> -->
        <!-- Banner -->
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9 col-11">
              <div class="text-center">
                <img
                  src="images/text.png"
                  class="img-fluid hero-banner"
                  alt="Miss"
                />
              </div>
            </div>
          </div>
        </div>
        <!-- Menu -->
        <div class="container hero-menu">
          <div class="row align-items-end justify-content-center g-3">
            <div class="col-lg-2 col-md-4 col-6">
<a href="#"
   class="hero-btn popup-btn"
   data-popup="rule">

    <img src="images/button 1.png" class="img-fluid">

    <span>THỂ LỆ</span>

</a>
            </div>
            <div class="col-lg-2 col-md-4 col-6">
<a href="#"
   class="hero-btn popup-btn"
   data-popup="guide">

    <img src="images/button 1.png" class="img-fluid">

    <span>HƯỚNG DẪN</span>

</a>
            </div>
            <div class="col-lg-2 col-md-4 col-12">
              <a href="#" class="main-btn">
                <img src="images/votebutton 1.png" class="img-fluid" />
                <span>THAM GIA NGAY</span>
              </a>
            </div>
            <div class="col-lg-2 col-md-4 col-6">
              <a href="https://hkdh.mye.vn/dl" class="hero-btn">
                <img src="images/button 1.png" class="img-fluid" />
                <span>TẢI GAME</span>
              </a>
            </div>
            <div class="col-lg-2 col-md-4 col-6">
              <a href="https://pay.mye.vn/" class="hero-btn">
                <img src="images/button 1.png" class="img-fluid" />
                <span>NẠP THẺ</span>
              </a>
            </div>
            <div class="container text-center mt-3">
              <img
                src="images/khungdautrang.png"
                class="img-fluid hero-bottom"
                alt="Bottom"
              />
            </div>
          </div>
        </div>

        <div class="container register-section">
          <div class="text-center register-title">
            <img src="images/đkdt.png" class="img-fluid" alt="Đăng ký dự thi" />
          </div>

          <div class="row g-4 align-items-start">
            <div class="col-lg-7">
              <label class="upload-main">
                <input type="file" hidden />

                <img src="images/themanh.png" class="img-fluid" />
              </label>
              <div class="row g-2 mt-2">
                <div class="col-4">
                  <label class="upload-small">
                    <input type="file" hidden />

                    <img src="images/themanhnho.png" class="img-fluid" />
                  </label>
                </div>

                <div class="col-4">
                  <label class="upload-small">
                    <input type="file" hidden />

                    <img src="images/themanhnho.png" class="img-fluid" />
                  </label>
                </div>

                <div class="col-4">
                  <label class="upload-small">
                    <input type="file" hidden />

                    <img src="images/themanhnho.png" class="img-fluid" />
                  </label>
                </div>
              </div>

              <p class="upload-note">*Bắt buộc phải đăng ký đủ 4 ảnh dự thi</p>
            </div>
            <div class="col-lg-5">
              <div class="player-info">
                <p>
                  Nhân vật :
                  <span>Lục Trà Bạc Hà</span>
                </p>

                <p>
                  Bang hội :
                  <span>Lạc Viên</span>
                </p>

                <p>
                  Máy chủ :
                  <span>S1 - Lý Bạch</span>
                </p>
              </div>
              <div class="d-flex gap-2 mt-3">
                <label class="radio-image">
                  <input type="radio" name="gender" checked />

                  <img src="images/thimiss.png" class="img-fluid" />
                </label>

                <label class="radio-image">
                  <input type="radio" name="gender" />

                  <img src="images/thimisster.png" class="img-fluid" />
                </label>
              </div>
              <div class="register-form mt-3">
                <div class="image-input">
                  <img src="images/box text.png" />

                  <input type="text" placeholder="Nhập địa chỉ nhận thưởng" />
                </div>

                <div class="row mt-2">
                  <div class="col-6">
                    <div class="image-input">
                      <img src="images/boxtextngan.png" />

                      <input type="text" placeholder="Số điện thoại" />
                    </div>
                  </div>

                  <div class="col-6">
                    <div class="image-input">
                      <img src="images/boxtextngan.png" />

                      <input type="text" placeholder="Khu vực" />
                    </div>
                  </div>
                </div>
                <p class="cmnd-title">Nhập ảnh CMND/CCCD mặt trước và sau</p>

                <div class="row">
                  <div class="col-6">
                    <label class="upload-card">
                      <input type="file" hidden />

                      <img src="images/mattruoc.png" class="img-fluid" />
                    </label>
                  </div>

                  <div class="col-6">
                    <label class="upload-card">
                      <input type="file" hidden />

                      <img src="images/matsau.png" class="img-fluid" />
                    </label>
                  </div>
                </div>
                <div class="image-textarea mt-3">
                  <img src="images/boxtext bự.png" />

                  <textarea placeholder="Nhập nội dung giới thiệu"></textarea>
                </div>
                <div class="image-input mt-2">
                  <img src="images/box text.png" />

                  <input type="text" placeholder="Nhập video dự thi" />
                </div>
                <div class="row mt-3">
                  <div class="col-6">
<button
    class="image-button"
    id="btnSubmit">

    <img src="images/buttondongy.png">

</button>
                  </div>

                  <div class="col-6">
                    <button class="image-button">
                      <img src="images/buttonhuybo.png" />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
<!-- POPUP -->
<div id="popupOverlay" class="popup-overlay">

    <div id="popupBox" class="popup-rule">

        <div id="popupContent" class="popup-content">
        </div>
        <button id="closePopup" class="popup-close"></button>

    </div>

</div>
<!-- Thành Công -->
<div id="successPopup" class="success-overlay">

    <div id="successBox" class="success-popup">

        <div id="successContent" class="success-body">

        </div>

        <button
            id="closeSuccess"
            class="success-close">
        </button>

    </div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/popup.js"></script>
  </body>
</html>
