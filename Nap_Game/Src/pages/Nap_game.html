    />

  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img src="../assets/images/logo.png" class="logo" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarGame"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarGame">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="Trang_chu.html"> Trang Chủ </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="Tro_choi.html"> Trò Chơi </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="Nap_game.html"> Nạp Game </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> Tin Tức </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> Hỗ Trợ </a>
            </li>
          </ul>
          <a href="Dang_nhap.html" class="login-btn"> Đăng Nhập </a>
        </div>
      </div>
    </nav>
    <section class="banner-section">
      <div class="container">
        <div class="banner">
          <img
            src="../assets/images/Nap_Game/Hero-banner.png"
            class="img-fluid"
          />
          <button class="history-btn">Lịch sử giao dịch</button>
        </div>
      </div>
    </section>
    <section class="game-section">
      <div class="container">
        <div class="row align-items-center mb-4">
          <div class="col-lg-6 col-md-12">
            <h2 class="game-title">DANH SÁCH GAME</h2>
          </div>

          <div class="col-lg-6 col-md-12">
            <div class="search-box">
              <i class="bi bi-search"></i>

              <input
                type="text"
                id="searchGame"
                placeholder="Hào Khí Chiến Hồn"
              />
            </div>
          </div>
        </div>
        <div class="category-list">
          <button class="category active">TẤT CẢ <span>60</span></button>

          <button class="category">SIMULATION <span>4</span></button>

          <button class="category">ACTION <span>11</span></button>

          <button class="category">RPG <span>37</span></button>

          <button class="category">SHOOTING <span>5</span></button>

          <button class="category">RACING <span>1</span></button>
        </div>
        <div
          class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 gx-2 gy-4 justify-content-center"
          id="gameList"
        ></div>
        <div class="pagination-custom">
          <span class="active"></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </section>
