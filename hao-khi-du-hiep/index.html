<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trang đăng ký tham gia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <header class="main-header">

        <div class="container-fluid h-100">

            <div class="header-container">

                <!-- Logo trái -->

                <a href="#" class="logo">
                    <img
                        src="assets/images/iconapp.png"
                        alt="Hào Khí Du Hiệp">
                </a>

                <!-- Action phải -->

                <div class="header-actions">

                    <a href="#" class="icon-btn">
                        <i class="fa-solid fa-house"></i>
                    </a>

                    <a href="#" class="icon-btn">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>

                    <a href="#" class="login-btn">
                        <img
                            src="assets/images/đn.png"
                            alt="Đăng nhập">
                    </a>

                </div>

            </div>

        </div>

    </header>
    <div class="hkdh-logo">

        <img
            src="assets/images/Logo-HaoKhiDuHiep.png"
            alt="Hào Khí Du Hiệp">

    </div>
    <section class="hero-section">
        <img
            src="assets/images/BGTRANGVOTING.png"
            class="hero-bg"
            alt="Background">
        <div class="miss-mister-logo">

            <img
                src="assets/images/text.png"
                alt="Miss Mister">

        </div>
        <div class="menu-container">

            <div class="menu-background">

                <img
                    src="assets/images/khungdautrang.png"
                    alt="Menu Background">

            </div>
            <div class="menu-group">
                <a
                    href="dang-ky.html"
                    class="menu-btn menu-rule">

                    <img
                        src="assets/images/button 1.png"
                        alt="Thể lệ">

                    <span>
                        THỂ LỆ
                    </span>

                </a>
                <a
                    href="#"
                    class="menu-btn menu-guide">

                    <img
                        src="assets/images/button 1.png"
                        alt="Hướng dẫn">

                    <span>
                        HƯỚNG DẪN
                    </span>

                </a>
                <a
                    href="dang-ky.html"
                    class="join-btn">

                    <img
                        src="assets/images/votebutton.png"
                        alt="Tham gia ngay">

                    <span>

                        THAM GIA
                        <br>
                        NGAY

                    </span>

                </a>
                <a
                    href="#"
                    class="menu-btn menu-download">

                    <img
                        src="assets/images/button 1.png"
                        alt="Tải game">

                    <span>
                        TẢI GAME
                    </span>

                </a>
                <a
                    href="#"
                    class="menu-btn menu-recharge">

                    <img
                        src="assets/images/button 1.png"
                        alt="Nạp thẻ">

                    <span>
                        NẠP THẺ
                    </span>

                </a>

            </div>

        </div>
<div class="register-area">
    <div class="register-title">

        <img
            src="assets/images/đkdt.png"
            alt="Đăng ký dự thi">

    </div>

    <div class="register-content">

        <!-- LEFT -->

        <div class="register-left">

            <div class="main-upload">

                <img
                    src="assets/images/themanh.png"
                    class="upload-frame">

                <input
                    type="file"
                    id="mainUpload"
                    hidden>

                <label
                    for="mainUpload"
                    class="upload-overlay">

                    <img
                        src="assets/images/icon-upload.png">
                </label>

            </div>

            <div class="sub-upload-list">

                <div class="sub-upload">

                    <img
                        src="assets/images/themanhnho.png">

                </div>

                <div class="sub-upload">

                    <img
                        src="assets/images/themanhnho.png">

                </div>

                <div class="sub-upload">

                    <img
                        src="assets/images/themanhnho.png">

                </div>

            </div>

            <p class="upload-note">

                *Bắt buộc phải đăng ký đủ 4 ảnh dự thi

            </p>

        </div>

        <!-- RIGHT -->

        <div class="register-right">

            <div class="character-info">

                <p>Nhân vật: <span>Luc Trà Bạc Hà</span></p>

                <p>Bang hội: <span>Lạc Viên</span></p>

                <p>Máy chủ: <span>S1 - Lý Bạch</span></p>

            </div>

            <!-- MISS -->

            <div class="contest-type">

                <label class="type-btn">

                    <input
                        type="radio"
                        name="contest">

                    <img
                        src="assets/images/thimiss.png">

                </label>

                <label class="type-btn">

                    <input
                        type="radio"
                        name="contest">

                    <img
                        src="assets/images/thimisster.png">

                </label>

            </div>

            <!-- ADDRESS -->

            <div class="input-image">

                <img
                    src="assets/images/box text.png">

                <input
                    type="text"
                    placeholder="Nhập địa chỉ liên hệ nhận thưởng">

            </div>

            <!-- ROW -->

            <div class="double-input">

                <div class="input-image">

                    <img
                        src="assets/images/boxtextngan.png">

                    <input
                        type="text"
                        placeholder="Nhập số điện thoại">

                </div>

                <div class="input-image">

                    <img
                        src="assets/images/boxtextngan.png"">

                    <input
                        type="text"
                        placeholder="Chọn khu vực">

                </div>

            </div>

            <!-- CCCD -->

            <div class="cccd-title">

                Nhập ảnh CMND/CCCD mặt trước và sau

            </div>

            <div class="double-input">

                <div class="upload-small-btn">

                    <img
                        src="assets/images/mattruoc.png">

                </div>

                <div class="upload-small-btn">

                    <img
                        src="assets/images/matsau.png">

                </div>

            </div>

            <!-- DESCRIPTION -->

            <div class="textarea-image">

                <img
                    src="assets/images/boxtext bự.png">

                <textarea
                    placeholder="Nhập nội dung giới thiệu"></textarea>

            </div>

            <!-- VIDEO -->

            <div class="input-image">

                <img
                    src="assets/images/box text.png">

                <input
                    type="text"
                    placeholder="Nhập video dự thi">

            </div>

            <!-- BUTTON -->

            <div class="action-area">

                <a href="#">

                    <img
                        src="assets/images/buttondongy.png">
                    
                </a>

                <a href="#">

                    <img
                        src="assets/images/buttonhuybo.png">

                </a>

            </div>

        </div>

    </div>

</div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
